<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Emergency Hero 3D</title>
    <style>
      /* ─── BASE RESET ────────────────────────────────── */
      body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      #root { height: 100%; width: 100%; }

      /* ─── CHILD-FRIENDLY TYPOGRAPHY ─────────────────── */
      /* 16 px minimum per WCAG; system font stack for fastest FCP */
      *, *::before, *::after { box-sizing: border-box; }
      body {
        font-family: 'Nunito', 'Segoe UI', system-ui, -apple-system, sans-serif;
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation; /* kill 300ms tap delay on mobile */
      }

      /* ─── SHARED BUTTON CLASS (replaces 20+ inline hover handlers) ── */
      .kid-btn {
        transition: transform 0.18s ease, box-shadow 0.18s ease !important;
        cursor: pointer;
        min-height: 44px;   /* WCAG minimum touch target */
        min-width: 44px;
      }
      .kid-btn:hover  { transform: scale(1.06) !important; box-shadow: 0 6px 25px rgba(0,0,0,0.25) !important; }
      .kid-btn:active { transform: scale(0.97) !important; }

      /* ─── FOCUS VISIBLE (keyboard users + screen readers) ─── */
      :focus-visible {
        outline: 3px solid #66D3FA;
        outline-offset: 2px;
      }

      /* ─── REDUCED MOTION PREFERENCE ────────────────── */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
